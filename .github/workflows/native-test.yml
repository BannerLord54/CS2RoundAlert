name: Native Test Build

on:
  push:
    branches:
      - native-test
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Build native exe
        shell: msys2 {0}
        run: bash scripts/build-native-msys2.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2RoundAlert-native-test
          path: artifacts/native/*
