name: Native Test Build

on:
  push:
    branches:
      - native-test
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build native exe
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSPATH=%%i
          call "%VSPATH%\Common7\Tools\VsDevCmd.bat" -arch=x64
          where cl
          mkdir artifacts
          cl /nologo /std:c++20 /EHsc /O2 /MT /utf-8 /DUNICODE /D_UNICODE /D_WIN32_WINNT=0x0A00 src\CS2RoundAlert.Native\CS2RoundAlert.cpp /Fe:artifacts\CS2RoundAlert.exe /link /SUBSYSTEM:WINDOWS

      - name: Create checksum
        shell: pwsh
        run: |
          $hash = Get-FileHash artifacts/CS2RoundAlert.exe -Algorithm SHA256
          "$($hash.Hash)  CS2RoundAlert.exe" | Set-Content artifacts/CS2RoundAlert.exe.sha256
          Get-ChildItem artifacts | Select-Object Name,Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2RoundAlert-native-test
          path: artifacts/*
