name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: >
          dotnet publish src/CS2RoundAlert/CS2RoundAlert.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Create checksum
        shell: pwsh
        run: |
          $hash = Get-FileHash publish/CS2RoundAlert.exe -Algorithm SHA256
          "$($hash.Hash)  CS2RoundAlert.exe" | Set-Content publish/CS2RoundAlert.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/CS2RoundAlert.exe
            publish/CS2RoundAlert.exe.sha256
